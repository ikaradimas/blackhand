[package]
name = "blackhand"
version = "0.2.0"
description = "BlackHand — neon-noir BitTorrent client"
authors = ["BlackHand Contributors"]
edition = "2021"

[lib]
name = "blackhand_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-notification = "2"
tauri-plugin-log = "2"
log = "0.4"
tauri-plugin-dialog = "2.7.1"

[target."cfg(any(target_os = \"macos\", windows, target_os = \"linux\"))".dependencies]
tauri-plugin-single-instance = { version = "2", features = ["deep-link"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Torrent engine
librqbit = "8.1"

# Async runtime + utilities
tokio = { version = "1", features = ["full"] }

# Error handling
thiserror = "2"
anyhow = "1"

# OS-correct config/data paths
dirs = "5"

# Type-safe Tauri command + event bindings (auto-generated TS in src/lib/bindings.ts)
specta = { version = "=2.0.0-rc.24", features = ["derive"] }
specta-typescript = "=0.0.11"
tauri-specta = { version = "=2.0.0-rc.24", features = ["derive", "typescript"] }
